<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panel de Confirmaciones</title>

<link rel="stylesheet" href="admin.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

</head>
<body>

<div id="loginBox" class="login-box">

    <h2>Panel de Confirmaciones</h2>

    <input
        type="password"
        id="password"
        placeholder="Contraseña"
    >

    <button onclick="login()">
        Ingresar
    </button>

</div>

<div id="panel" style="display:none;">

    <h1>Confirmaciones</h1>

    <section class="cards">

        <div class="card">
            <h3>Confirmados</h3>
            <span id="confirmados">0</span>
        </div>

        <div class="card">
            <h3>Pendientes</h3>
            <span id="pendientes">0</span>
        </div>

        <div class="card">
            <h3>No asistirán</h3>
            <span id="noAsisten">0</span>
        </div>

        <div class="card">
            <h3>Personas Confirmadas</h3>
            <span id="personas">0</span>
        </div>

        <div class="card">
            <h3>Cupos Totales</h3>
            <span id="cupos">0</span>
        </div>

    </section>

    <div class="acciones">

        <button onclick="exportarExcel()">
            Exportar Excel
        </button>

        <button onclick="exportarPDF()">
            Exportar PDF
        </button>

    </div>

    <h2>Listado General</h2>

    <div class="table-wrapper">

        <table id="tablaGeneral">

            <thead>
                <tr>
                    <th>ID</th>
                    <th>Invitado</th>
                    <th>Estado</th>
                    <th>Cupo</th>
                    <th>Confirmados</th>
                </tr>
            </thead>

            <tbody id="tbody">
            </tbody>

            <tfoot>

                <tr>

                    <th colspan="3">
                        Totales
                    </th>

                    <th id="totalCupos">
                        0
                    </th>

                    <th id="totalConfirmados">
                        0
                    </th>

                </tr>

            </tfoot>

        </table>

    </div>

    <h2>Confirmados</h2>

    <div class="table-wrapper">
        <table id="tablaConfirmados"></table>
    </div>

    <h2>No asistirán</h2>

    <div class="table-wrapper">
        <table id="tablaNoAsisten"></table>
    </div>

    <h2>Pendientes de confirmación</h2>

    <div class="table-wrapper">
        <table id="tablaPendientes"></table>
    </div>

</div>

<script src="admin.js"></script>

</body>
</html>
